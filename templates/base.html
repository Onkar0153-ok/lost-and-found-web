<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { shadow: 0 2px 4px rgba(0,0,0,.1); }
        .card { border: none; border-radius: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-primary { border-radius: 8px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard">🔍 LostFound</a>
        <div class="navbar-nav ms-auto">
            {% if session['user_id'] %}
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/items">Browse All</a>
                <a class="nav-link" href="/post">Post Item</a>
                <a class="nav-link btn btn-danger btn-sm text-white ms-lg-2" href="/logout">Logout</a>
            {% else %}
                <a class="nav-link" href="/login">Login</a>
                <a class="nav-link" href="/register">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>
{% if session['is_admin'] == 1 %}
    <li class="nav-item">
        <a class="nav-link fw-bold text-danger" href="/admin/dashboard">⚙️ Admin</a>
    </li>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends "base.html" %}
{% block content %}
<style>
    /* Matching the animated background */
    body {
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        min-height: 100vh;
    }

    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
</style>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Create Account</h2>
                    <p class="text-muted">Join the community today</p>
                </div>
                <form method="POST">
                    <div class="form-floating mb-3">
                        <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                        <label>Full Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Email" required>
                        <label>Email address</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                        <label>Create Password</label>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 py-3 fw-bold btn-animate rounded-pill shadow">
                        SIGN UP
                    </button>
                </form>
                <div class="text-center mt-4">
                    <p class="small text-muted">Already a member? <a href="/login" class="text-decoration-none fw-bold text-primary">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
